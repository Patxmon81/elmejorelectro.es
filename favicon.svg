<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <!-- Glow for the power indicator -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#E8440A" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#E8440A" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#E8440A" stop-opacity="0"/>
    </radialGradient>
    <!-- Handle gradient for depth -->
    <linearGradient id="handle" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#F55A1A"/>
      <stop offset="100%" stop-color="#C73309"/>
    </linearGradient>
    <!-- Body gradient for depth -->
    <linearGradient id="body" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#353550"/>
      <stop offset="100%" stop-color="#252535"/>
    </linearGradient>
  </defs>

  <!-- ── Background: rounded square ── -->
  <rect width="32" height="32" rx="7" fill="#1A1A2E"/>

  <!-- ── Steam / heat waves ── -->
  <path d="M13 10.5 Q11.2 7.5 13 4.5" stroke="#E8440A"  stroke-width="1.6" fill="none" stroke-linecap="round" opacity="0.85"/>
  <path d="M16 10.5 Q14.2 7.5 16 4.5" stroke="#F5A623"  stroke-width="1.7" fill="none" stroke-linecap="round"/>
  <path d="M19 10.5 Q17.2 7.5 19 4.5" stroke="#E8440A"  stroke-width="1.6" fill="none" stroke-linecap="round" opacity="0.85"/>

  <!-- ── Fryer body ── -->
  <rect x="5" y="10.5" width="22" height="15.5" rx="4.5" fill="url(#body)"/>

  <!-- ── Ventilation top band ── -->
  <rect x="5"  y="10.5" width="22" height="4.5" rx="4.5" fill="#20202E"/>
  <rect x="5"  y="13"   width="22" height="2"   fill="#20202E"/>

  <!-- Vent slots -->
  <rect x="8"    y="11.5" width="3.5" height="1.2" rx="0.6" fill="#0C0C1A"/>
  <rect x="13.5" y="11.5" width="5"   height="1.2" rx="0.6" fill="#0C0C1A"/>
  <rect x="20.5" y="11.5" width="3.5" height="1.2" rx="0.6" fill="#0C0C1A"/>

  <!-- Subtle top-left shine on body -->
  <rect x="5.5" y="14.5" width="9" height="5" rx="2" fill="white" opacity="0.03"/>

  <!-- ── Display screen ── -->
  <rect x="8.5" y="16" width="15" height="5.5" rx="2" fill="#060A12"/>
  <rect x="8.5" y="16" width="15" height="1.2" rx="2" fill="white" opacity="0.04"/>

  <!-- Glow halo behind power dot -->
  <circle cx="16" cy="18.8" r="3.5" fill="url(#glow)"/>
  <!-- Power indicator dot -->
  <circle cx="16" cy="18.8" r="1.5" fill="#E8440A"/>
  <!-- Tiny specular on power dot -->
  <circle cx="15.5" cy="18.3" r="0.45" fill="white" opacity="0.55"/>

  <!-- ── Drawer / handle ── -->
  <rect x="7"  y="24" width="18" height="4"   rx="2"    fill="url(#handle)"/>
  <rect x="12" y="25.2" width="8" height="1.4" rx="0.7" fill="#A02808" opacity="0.6"/>
</svg>
